# figure_generator path configuration.
#
# Override per-user by setting environment variables:
#   FIGGEN_PAPERS_ROOT
#   FIGGEN_RESEARCH_NOTES
#
# Values below are defaults used when those env vars are unset.

# Root for per-paper Tier-2 assets (figure_inputs/, planning/, etc.).
# Relative paths are resolved from the figure_generator repo root.
papers_root: papers

# Local clone of ksk5429/research-notes (the publication site).
# Used by scripts/publish_to_notes.py. Can be overridden via FIGGEN_RESEARCH_NOTES.
research_notes: ../mkdocs_material

# Optional external data roots. Figures that reference these via an absolute
# path will succeed locally but be flagged as non-portable in metadata.
external_data_roots:
  field: F:/TREE_OF_THOUGHT/PHD/papers/field_data
  centrifuge: F:/TREE_OF_THOUGHT/PHD/papers/centrifuge_data
  numerical: F:/TREE_OF_THOUGHT/PHD/papers/numerical_data

# Per-paper manuscript sources. `publish_paper.py PAPER=<code>` reads this
# block to find the canonical .qmd for each paper. Paths are absolute
# because the manuscripts live outside this repo.
#
# Per-paper fields:
#   qmd:       absolute path to the canonical Quarto source
#   journal:   target journal (used in the AAM banner)
#   status:    under-review | accepted | published | draft
#   reference: journal's manuscript ID (e.g., "OE-D-26-02685")
#   doi:       DOI once assigned; null otherwise (banner shows a placeholder)
manuscripts:
  J2:
    qmd: F:/GITHUB3/docs/manuscripts/current/ch4_geotechnical_modeling_optumgx_opensees/MANUSCRIPT/manuscript_v16.qmd
    journal: Marine Structures
    status: under-review
    reference: submitted-R2
    doi: null
  J3:
    qmd: F:/GITHUB3/docs/manuscripts/current/ch5_centrifuge_testing_year2/manuscript_v8.qmd
    journal: Ocean Engineering
    status: under-review
    reference: OE-D-26-02685
    doi: null
  V:
    # MSSP26-1185 — Double-Filter Framework for Physics-Informed Vibration-
    # Based Scour Detection. The internal paper code "V" (per the research-
    # notes portfolio outline papers/V.md) maps to this manuscript.
    qmd: F:/GITHUB3/docs/manuscripts/current/ch6_field_monitoring_oma/manuscript16.qmd
    journal: Mechanical Systems and Signal Processing
    status: under-review
    reference: MSSP26-1185
    doi: null
  B:
    qmd: F:/GITHUB3/docs/manuscripts/current/ch7_pca_based_method/manuscript.qmd
    journal: Computers and Geotechnics
    status: draft
    reference: null
    doi: null
  A:
    qmd: F:/TREE_OF_THOUGHT/PHD/papers/paperA_dt_decision/manuscript.qmd
    journal: Reliability Engineering & System Safety
    status: draft
    reference: null
    doi: null
  E:
    qmd: F:/TREE_OF_THOUGHT/PHD/papers/paperE_encoder/manuscript.qmd
    journal: (methods paper, archived into A)
    status: draft
    reference: null
    doi: null
  Op3:
    qmd: F:/TREE_OF_THOUGHT/PHD/papers/paperOp3_aes/manuscript.qmd
    journal: Advances in Engineering Software
    status: draft
    reference: null
    doi: null
  J5:
    qmd: F:/TREE_OF_THOUGHT/PHD/papers/paperJ5_mc_optumgx/manuscript.qmd
    journal: (target TBD)
    status: draft
    reference: null
    doi: null
  J11:
    qmd: F:/TREE_OF_THOUGHT/PHD/papers/paperJ11_vesic_dissipation/manuscript.qmd
    journal: (target TBD)
    status: draft
    reference: null
