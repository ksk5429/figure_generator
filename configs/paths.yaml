# figure_generator path configuration.
#
# Override per-user by setting environment variables:
#   FIGGEN_PAPERS_ROOT
#   FIGGEN_RESEARCH_NOTES
#
# Values below are defaults used when those env vars are unset.

# Root for per-paper Tier-2 assets (figure_inputs/, planning/, etc.).
# Relative paths are resolved from the figure_generator repo root.
papers_root: papers

# Local clone of ksk5429/research-notes (the publication site).
# Used by scripts/publish_to_notes.py. Can be overridden via FIGGEN_RESEARCH_NOTES.
research_notes: ../mkdocs_material

# Optional external data roots. Figures that reference these via an absolute
# path will succeed locally but be flagged as non-portable in metadata.
external_data_roots:
  field: F:/TREE_OF_THOUGHT/PHD/papers/field_data
  centrifuge: F:/TREE_OF_THOUGHT/PHD/papers/centrifuge_data
  numerical: F:/TREE_OF_THOUGHT/PHD/papers/numerical_data

# Per-paper manuscript sources. `publish_paper.py PAPER=<code>` reads this
# block to find the canonical .qmd for each paper. Paths are absolute
# because the manuscripts live outside this repo.
manuscripts:
  J2:
    qmd: F:/GITHUB3/docs/manuscripts/current/ch4_geotechnical_modeling_optumgx_opensees/MANUSCRIPT/manuscript_v16.qmd
  J3:
    qmd: F:/GITHUB3/docs/manuscripts/current/ch5_centrifuge_testing_year2/manuscript_v8.qmd
  # Add more as you confirm the canonical version per chapter.
  # O2:
  #   qmd: F:/GITHUB3/docs/manuscripts/current/ch4_1_optumgx_opensees_revised/5_manuscript/manuscript_vXX.qmd
  # MSSP:
  #   qmd: F:/GITHUB3/docs/manuscripts/current/ch6_field_monitoring_oma/manuscript16.qmd
