description: >
  G_max/G stiffness-scaling sensitivity study across the Hardin 1978
  band [2, 5]. (a) Baseline f_1 (left y) and % drop at S/D = 0.5
  (right y) vs scaling factor — both scale with the factor. (b) Power-law
  scour exponent b vs scaling factor, with a ±5% decision band shaded
  around the used value — b stays flat across the range, showing the
  scour-sensitivity conclusion is insensitive to the stiffness
  calibration choice.

