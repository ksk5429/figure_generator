description: >
  Normalised indicator hierarchy at the deepest scour stage (S/D=0.58),
  manuscript §5 Table 4. Grouped log-scale bar chart for eight
  monitoring indicators — Frequency, Stiffness, Damping, Bottom strain,
  Displacement, Settlement rate, Asymmetry index, Composite SDI —
  comparing T4 (dense sat.) and T5 (loose sat.). The T5/T4 ratio is
  annotated above each pair. Key observation: displacement ×51.8,
  asymmetry index ×113, while frequency only ×3.0 — frequency alone is
  the weakest early-warning signal for the bending-to-tilting
  transition.

