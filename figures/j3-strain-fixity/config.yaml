tier: 2
tier2_slug: strain-fixity

description: >
  Strain-elevation ratios as a bending-vs-tilting discriminator
  (manuscript §4.1). Single panel at 85 mm column width. RMS strain
  ratios bot/mid and bot/top plotted against S/D for T4 (dense sat.,
  elastic bending) and T5 (loose sat., rigid-body tilting). T4 bot/mid
  jumps +17.8 % from baseline to the first scour stage and plateaus —
  textbook fixity-point migration. T5 bot/mid stays at 0.173 +/- 0.001
  across every stage — no migration, consistent with rigid-body
  tilting about the yielded upwind bucket. Post-backfill values shown
  as star markers at S/D = 0.65 offset.

