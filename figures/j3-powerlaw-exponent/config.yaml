description: >
  Power-law exponent distribution across the five centrifuge test
  series (manuscript §5, revision R1). Horizontal bar chart of b in
  |Δf_1/f_1,0| = a (S/D)^b for T1-T5, with the cross-series mean
  b = 1.41, the ±1σ band = 0.40, and the clay-calibrated reference
  b = 1.47 from the companion numerical paper (J2) overlaid as a
  dashed vertical line. Individual exponents span 0.80 (T4 dense sat.)
  to 1.96 (T2 loose dry); soil condition modulates the exponent but
  not the underlying power-law form.

