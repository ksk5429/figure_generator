description: >
  Cross-sectional schematic of the 1:70 centrifuge model installed in
  the KAIST beam-centrifuge strongbox (1400 x 700 mm). Tripod foundation
  with 3 suction buckets (D=114 mm, L=133 mm model; 8 m and 9.3 m
  prototype) supporting the EI-equivalent tower stub and RNA. Section
  plane cuts through buckets A and B (bucket C is hidden behind B).
  Shows saturated sand bed with scour holes (S/D = 0.58, max tested),
  water surface, and the section-plane shake direction.

