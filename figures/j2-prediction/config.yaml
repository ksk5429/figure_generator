figure_id: j2-prediction
journal: ocean_engineering
width: one_half

paper: J2
claim_id: j2-prediction
tier: 2
tier2_slug: prediction

description: >
  Predictive-capability comparison: four foundation idealisations
  (Fixed base, Macro-element, Standard BNWF, Distributed BNWF) benchmarked
  against the 32-month Gunsan field mean f₀ = 0.2400 Hz. Horizontal bars
  show predicted baseline f₀; the shaded vertical bands mark ±CoV (1.53%)
  and ±CI95 (0.6%) around the field mean. Only the Distributed BNWF lands
  inside the CI band and does so on the conservative (underpredicting)
  side.

data_sources:
