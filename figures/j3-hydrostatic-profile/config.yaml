description: >
  Hydrostatic pore pressure profile u_0 = gamma_w * N * z inside the
  saturated bucket at 70 g (manuscript §3, submitted Fig 2). Depth axis
  inverted, zero at bucket lid, skirt tip at 132 mm. PPT 2-5 markers
  at 70/120/170/220 mm for T4 (open) and T5 (filled). PPT 1 at 20 mm
  excluded. Shaded band below the skirt tip indicates sensors sitting
  in native soil outside the bucket.
