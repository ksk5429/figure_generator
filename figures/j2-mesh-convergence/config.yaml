figure_id: j2-mesh-convergence
journal: ocean_engineering
width: single
paper: J2
claim_id: j2-mesh-convergence
tier: 2
tier2_slug: mesh-convergence
description: >
  Mesh convergence efficiency frontier for the OptumGX 3D-FE model
  (manuscript submitted Fig 5). Eight mesh refinements from 2k to 30k
  elements, with relative error to the finest mesh (N=30k) on the
  y-axis and computation time on the x-axis. Reference lines mark
  1 % and 0.5 % error thresholds; error drops below 1 % at N=15k and
  below 0.5 % at N=20k. Each point is annotated with its element
  count.
