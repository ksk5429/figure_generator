description: >
  Stress-release mechanism behind the saturation effect (manuscript
  Section 4.3). Three panels at 190 mm width: (a) pre-scour sigma_v(z)
  for dry vs submerged sand; (b) post-scour at S/D = 0.58 with the
  hatched "lost stress" layer between z=0 and z=S; (c) G_max(z) = A_G
  * sqrt(sigma_v) illustrating the Hardin 1972 law. Analytical ratio
  sqrt(γ'/γ_d) ≈ 0.80 annotated in panel (c).

