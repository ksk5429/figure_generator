description: >
  Factor-of-two reframing of the saturation effect (manuscript §4.2,
  revision R1). (a) |Δf_1/f_1,0| vs S/D for five centrifuge series
  (T1–T5) with power-law fits overlaid; (b) secant-slope bar chart
  paired by density (Dense T1 vs T4, Loose T2 vs T5), with dry/saturated
  ratios ×6.96 and ×1.94 annotated and the Hardin (γ_d/γ')^0.5 × slope(T5)
  prediction drawn as a dashed reference. The density-dependent ratio
  (×7 dense vs ×2 loose) shows the saturation effect is strongly
  modulated by relative density and is only partly captured by the
  Hardin unit-weight mechanism.

