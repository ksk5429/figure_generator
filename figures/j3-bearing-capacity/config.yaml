description: >
  Bearing-capacity degradation under scour for the T4 (dense saturated)
  and T5 (loose saturated) series. Panel (a) absolute qu vs S/D; panel
  (b) qu/qu_intact vs S/D with the 50-70% nonlinear-onset band shaded.
  Uses corrected phi' values (T4 = 39.3 deg, T5 = 37.3 deg) — withdraws
  the R0 figures that used the mislabelled 37.5/35.5 values.

