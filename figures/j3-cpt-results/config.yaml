figure_id: j3-cpt-results
journal: ocean_engineering
width: double

paper: J3
claim_id: j3-cpt-results
tier: 2
tier2_slug: cpt-results

description: >
  In-flight CPT soil characterisation (manuscript §3, @fig-cpt-results).
  Three panels at 190 mm width: (a) small-strain shear modulus G_0 for
  all five centrifuge series T1-T5 with D_r annotated inside each bar;
  (b) cone tip resistance q_c per scour stage + backfill for the two
  saturated tests T4 and T5, with the Backfill bar hatched to signal
  the No. 5 coarser sand regime; (c) normalized-parameter comparison
  (G_0, V_s, gamma', e) of T4 versus T5 with actual values at the bar
  tops and T4/T5 ratios annotated between the pairs. B&W-safe hatch +
  two-luma palette.

data_sources:
