description: >
  Population-mean horizontal capacity Hmax vs normalised scour depth
  S/D (manuscript @fig-degradation-curves). Shaded band spans p5-p95
  quantiles across 200 LHS realisations per scour stage (PC3 covers
  S/D = 0.3125, 0.375; PC4 covers S/D = 0.4375, 0.5). Mean drops
  13.4% from the shallowest to the deepest stage in the committed
  subset; CoV stays near 0.27 at every stage.

