description: >
  Cross-study comparison of scour-frequency sensitivity |df_1/f_1,0|
  for tripod/jacket suction-bucket foundations and monopiles (submitted
  Fig. 11). Two panels: (a) saturated soil, (b) dry soil. Each horizontal
