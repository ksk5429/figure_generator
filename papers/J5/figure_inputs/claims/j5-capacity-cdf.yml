claim_id: j5-capacity-cdf
paper: J5
status: confirmed
source: manuscript.qmd + @fig-hmax-cdf
origin_note: |
  Empirical CDF of Hmax_kN across 200 LHS realisations per scour
  stage (800 total rows across 4 S/D values). Spread between p5 and
  p95 is roughly 2.3x at every S/D, reflecting the propagated soil
  uncertainty.

headline: >
  p95 / p5 spread of Hmax is ~2.3x at every scour stage in the
  committed 800-realisation subset, demonstrating that soil-parameter
  uncertainty dominates over scour geometry at any single stage.

primary_figure: figures/j5-capacity-cdf

assertions:
  - name: pc3_shallowest_p5
    parquet: degradation-quantiles.parquet
    compute: {op: mean, column: hmax_p5_kn, filter: {pc_id: PC3, s_over_d: 0.3125}}
    op: near
    value: 13847.5
    tolerance: 2.0

  - name: pc3_shallowest_p95
    parquet: degradation-quantiles.parquet
    compute: {op: mean, column: hmax_p95_kn, filter: {pc_id: PC3, s_over_d: 0.3125}}
    op: near
    value: 32075.1
    tolerance: 2.0

  - name: pc4_deepest_p5
    parquet: degradation-quantiles.parquet
    compute: {op: mean, column: hmax_p5_kn, filter: {pc_id: PC4, s_over_d: 0.5}}
    op: near
    value: 11903.7
    tolerance: 2.0

  - name: pc4_deepest_p95
    parquet: degradation-quantiles.parquet
    compute: {op: mean, column: hmax_p95_kn, filter: {pc_id: PC4, s_over_d: 0.5}}
    op: near
    value: 28019.6
    tolerance: 2.0

  - name: spread_ratio_pc3_shallow_above_2
    parquet: mc-ensemble.parquet
    compute: {op: mean, column: Hmax_kN, filter: {pc_id: PC3, S_D: 0.3125}}
    op: greater
    value: 10000

  - name: cov_near_0_27
    parquet: degradation-quantiles.parquet
    compute: {op: mean, column: hmax_cov}
    op: near
    value: 0.273
    tolerance: 0.01
