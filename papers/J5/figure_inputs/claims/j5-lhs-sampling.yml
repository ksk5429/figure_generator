claim_id: j5-lhs-sampling
paper: J5
status: confirmed
source: manuscript.qmd + @fig-lhs-scatter
origin_note: |
  Latin Hypercube Sampling of four soil parameters (su0, k_su,
  gamma, alpha_int). 800 realisations in the committed subset
  (200 per scour stage). Per-parameter CoV computed across the
  full 800 rows — all within published ranges for NC clay
  (Phoon & Kulhawy 1999).

headline: >
  LHS samples span the four-parameter soil space with target CoVs:
  su0 ~ 0.25, k_su ~ 0.30, gamma ~ 0.07, alpha_int within Kulhawy-Mayne
  range.

primary_figure: figures/j5-lhs-scatter

assertions:
  - name: cov_su0_near_0_25
    parquet: lhs-sample.parquet
    compute: {op: mean, column: cov_su0}
    op: near
    value: 0.247
    tolerance: 0.005

  - name: cov_k_su_near_0_30
    parquet: lhs-sample.parquet
    compute: {op: mean, column: cov_k_su}
    op: near
    value: 0.302
    tolerance: 0.005

  - name: cov_gamma_near_0_07
    parquet: lhs-sample.parquet
    compute: {op: mean, column: cov_gamma}
    op: near
    value: 0.070
    tolerance: 0.005

  - name: cov_alpha_int_below_0_25
    parquet: lhs-sample.parquet
    compute: {op: mean, column: cov_alpha_int}
    op: less
    value: 0.25

  - name: n_samples_800
    parquet: lhs-sample.parquet
    compute: {op: mean, column: n_samples}
    op: near
    value: 800.0
    tolerance: 0.1

  - name: su0_mean_in_gunsan_band
    parquet: lhs-sample.parquet
    compute: {op: mean, column: su0}
    op: between
    lo: 13.0
    hi: 18.0
