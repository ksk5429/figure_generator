# Claim witness — j2-vh-anchoring
#
# The anchoring constraint from manuscript Section 2.3:
#   ∫₀^L p_ult(z) dz = H_ult^VH   (H-mode)
#   ∫₀^L t_ult(z) dz = V_ult^VH   (V-mode)
#
# is enforced on the RAW HYPERBOLIC capacity profile by rescaling the
# power-law coefficient ``a`` in p_ult(z) = a·z^n. This claim verifies
# the constraint numerically at every scour level. The separate
# stress-release softening applied on top of the anchoring is a
# secondary correction and is NOT the anchoring itself — so the
# anchored-capacity ratio (which drops to 0.34 at S = 4.5 m) is
# reported for context but does not constrain the claim.

claim_id: j2-vh-anchoring
paper: J2
status: submitted
source: manuscript.qmd Section 2.3 VH Capacity and Spring Assembly
origin_note: |
  Raw hyperbolic integral matches envelope H_ult by construction (power-
  law coefficient is determined to satisfy ∫ p_ult dz = H_ult^VH at each
  scour). Observed ratios 1.02-1.07 reflect minor per-slice numerical
  artefacts of the rescaling. A separate stress-release correction
  (factor √(σ_v_after / σ_v_before) per slice) then multiplies the
  anchored profile to produce the OpenSees input p_ult values.

headline: >
  Raw hyperbolic p_ult integral matches envelope H_ult within ±8 %
  across all 10 scour levels in both H and V modes; anchoring holds
  by construction.

primary_figure: figures/j2-vh-anchoring

assertions:

  # ----- Intact case: anchoring must be near-exact -----
  - name: h_mode_intact_anchor_ratio_hyp_near_1
    parquet: vh-anchoring.parquet
    compute:
      op: mean
      filter: {mode: "H", scour_m: 0.0}
      column: anchor_ratio_hyp
    op: between
    lo: 0.98
    hi: 1.05

  - name: v_mode_intact_anchor_ratio_hyp_near_1
    parquet: vh-anchoring.parquet
    compute:
      op: mean
      filter: {mode: "V", scour_m: 0.0}
      column: anchor_ratio_hyp
    op: between
    lo: 1.00
    hi: 1.05

  # ----- Anchoring must be preserved at maximum scour -----
  - name: h_mode_max_scour_anchor_ratio_hyp_in_band
    parquet: vh-anchoring.parquet
    compute:
      op: mean
      filter: {mode: "H", scour_m: 4.5}
      column: anchor_ratio_hyp
    op: between
    lo: 1.00
    hi: 1.10

  - name: v_mode_max_scour_anchor_ratio_hyp_in_band
    parquet: vh-anchoring.parquet
    compute:
      op: mean
      filter: {mode: "V", scour_m: 4.5}
      column: anchor_ratio_hyp
    op: between
    lo: 1.00
    hi: 1.10

  # ----- Anchored (stress-corrected) ratio drops as documented -----
  - name: h_mode_anchored_ratio_at_max_scour_below_half
    parquet: vh-anchoring.parquet
    compute:
      op: mean
      filter: {mode: "H", scour_m: 4.5}
      column: anchor_ratio_anchored
    op: less
    value: 0.40

  # ----- Row inventory: 145 slices per mode -----
  - name: row_inventory_per_mode
    parquet: vh-anchoring.parquet
    compute:
      op: row_counts
      group_by: mode
    op: equal
    value:
      "H": 145
      "V": 145
