# Claim witness — j2-hsd-eff
#
# HSD (Harmonic Slice Decomposition) filters the raw circumferential
# pressure distribution P(θ) on each bucket skirt depth slice into an
# axisymmetric A0 (breathing) and a sway-mode A1·cos(θ). Only A1 carries
# net lateral force. The efficiency ratio η = |A1| / (|A0| + |A1|)
# measures the fraction of raw pressure identified as real lateral
# resistance — the remainder would be phantom stiffness if a naive
# mean-of-|P| extraction were used.

claim_id: j2-hsd-eff
paper: J2
status: submitted
source: manuscript.qmd Section 2.3 Net Soil Reaction Integration
origin_note: |
  54 rows (3 scour levels × 18-19 depth slices each) at final load step
  step8. Direct fit of A0 + A1·cos(θ) to per-element sigma_plus pressure
  from the OptumGX 3D-FE plate data.

headline: >
  Mean HSD efficiency 0.43 at intact and 0.28-0.29 at scoured cases —
  only ~30-43 % of the raw circumferential pressure on each skirt slice
  is real lateral resistance; the remainder is phantom axisymmetric
  confinement that HSD filters.

primary_figure: figures/j2-hsd-eff

assertions:

  # ----- Mean efficiency at intact case in 0.35-0.50 band -----
  - name: mean_efficiency_intact
    parquet: hsd-eff.parquet
    compute:
      op: mean
      filter: {scour_m: 0.0}
      column: hsd_efficiency
    op: between
    lo: 0.35
    hi: 0.50

  # ----- Mean efficiency at mid scour in 0.20-0.35 band -----
  - name: mean_efficiency_mid_scour
    parquet: hsd-eff.parquet
    compute:
      op: mean
      filter: {scour_m: 2.0}
      column: hsd_efficiency
    op: between
    lo: 0.20
    hi: 0.35

  # ----- Mean efficiency at max scour in 0.20-0.35 band -----
  - name: mean_efficiency_max_scour
    parquet: hsd-eff.parquet
    compute:
      op: mean
      filter: {scour_m: 4.5}
      column: hsd_efficiency
    op: between
    lo: 0.20
    hi: 0.35

  # ----- Efficiency is always in the valid [0, 1] range (probed by mean) -----
  - name: mean_phantom_frac_is_positive
    parquet: hsd-eff.parquet
    compute:
      op: mean
      column: phantom_frac
    op: between
    lo: 0.50
    hi: 0.80

  - name: mean_efficiency_overall
    parquet: hsd-eff.parquet
    compute:
      op: mean
      column: hsd_efficiency
    op: between
    lo: 0.20
    hi: 0.50

  # ----- Row inventory: 3 scour levels -----
  - name: row_inventory_scours
    parquet: hsd-eff.parquet
    compute:
      op: row_counts
      group_by: scour_m
    # S = 4.5 m has fewer depth slices because the scoured skirt is
    # shorter; the intact and mid-scour cases cover all 19 0.5 m slices
    # down to the tip, while the max-scour case only reaches 8 m of
    # remaining skirt.
    op: equal
    value:
      "0.0": 19
      "2.0": 19
      "4.5": 16
