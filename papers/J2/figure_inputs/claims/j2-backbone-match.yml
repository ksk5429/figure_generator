# Claim witness — j2-backbone-match
#
# The framework replaces 3D-FE soil reactions with a 1D hyperbolic
# backbone at every depth slice. This claim fixes the fit quality so
# that a regression (bad solver step, wrong y50 interpolation, broken
# p_ult extraction) is caught numerically before the figure ships.

claim_id: j2-backbone-match
paper: J2
status: submitted
source: manuscript.qmd Section 2.3 Hyperbolic Backbone Fitting
origin_note: |
  Per-slice hyperbolic fits against integrated OptumGX soil reactions.
  Mean R^2 > 0.75 (H-mode, p-y) and > 0.90 (V-mode, t-z) across 290
  slices (145 per mode across 10 scour levels and ~15 depths).

headline: >
  290 hyperbolic backbones across 10 scour levels and ~15 depths;
  mean R^2 = 0.78 for p-y fits and 0.91 for t-z fits.

primary_figure: figures/j2-backbone-match

assertions:

  # ----- Fit quality: R^2 thresholds per mode -----
  - name: h_mode_mean_r2_above_0_70
    parquet: backbone-fits.parquet
    compute:
      op: mean
      filter: {mode: "H"}
      column: r2_hyperbolic
    op: greater
    value: 0.70

  - name: v_mode_mean_r2_above_0_85
    parquet: backbone-fits.parquet
    compute:
      op: mean
      filter: {mode: "V"}
      column: r2_hyperbolic
    op: greater
    value: 0.85

  # ----- H-mode R^2 at the intact case (tightest band, nothing scoured):
  #       actual value ~0.79 — the claim fixes the empirical band. If a
  #       future change drags the intact fits under 0.75, the hyperbolic
  #       extraction has regressed and the figure must not ship. -----
  - name: h_mode_intact_mean_r2_in_band
    parquet: backbone-fits.parquet
    compute:
      op: mean
      filter: {mode: "H", scour_m: 0.0}
      column: r2_hyperbolic
    op: between
    lo: 0.75
    hi: 0.90

  # ----- V-mode intact R^2 ~0.83. Hyperbolic fits are imperfect on t-z
  #       curves near the tip where the response is more bilinear than
  #       hyperbolic; empirical band fixes the current quality. -----
  - name: v_mode_intact_mean_r2_in_band
    parquet: backbone-fits.parquet
    compute:
      op: mean
      filter: {mode: "V", scour_m: 0.0}
      column: r2_hyperbolic
    op: between
    lo: 0.80
    hi: 0.95

  # ----- Row inventory: 290 total fits, split by mode -----
  - name: fits_per_mode
    parquet: backbone-fits.parquet
    compute:
      op: row_counts
      group_by: mode
    op: equal
    value:
      "H": 145
      "V": 145
