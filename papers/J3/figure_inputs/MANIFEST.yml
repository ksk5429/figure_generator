# J3 — canonical figure inventory.
#
# One entry per *manuscript-referenced* figure (not per PNG variant on disk).
# Slugs map to the files in this directory: <slug>.parquet +
# <slug>.schema.yml + <slug>.provenance.json.
#
# Rules:
#   - `slug` must match the Tier-2 file stem.
#   - `claim_id` must exist in figure_inputs/claims/ or be null.
#   - `status` is one of: planned, drafted, built, publication-ready, migrated.
#   - `migrated: true` means the figure came from an existing PNG (F:/GITHUB3)
#     and its Tier-2 parquet was reconstructed post-hoc; mark the output as
#     "path A" in metadata to retain the forensic link.
#
# Do not invent data. If a figure's data is not yet in Tier-2, leave
# `status: planned` and the parquet/schema fields empty.

paper: J3
journal: ocean_engineering
source_manuscript: F:/GITHUB3/docs/manuscripts/current/ch5_centrifuge_testing_year2/manuscript_v8.qmd
last_updated: 2026-04-18

figures:

  # ─────────── Fig. 14 — effect of saturation on scour sensitivity ───────────
  # Two Tier-2 variants: "script" preserves the published numbers verbatim;
  # "measured" re-derives from the canonical CSV and surfaces the SD-gap.
  - n: 14
    slug: effect-saturation-script
    claim_id: j3-saturation-gain
    description: >
      Effect of saturation on scour sensitivity — preserved rendition of
      fig14_effect_saturation.py. Witnesses the corrected 1.7–1.9× loose-pair
      ratio. (Path A of the Tier-2 migration.)
    figure_ref: figures/j3-effect-saturation
    panels: 2
    status: built
    migrated: true

  - n: 14b
    slug: effect-saturation-measured
    claim_id: j3-saturation-gain
    description: >
      CSV-derived audit counterpart — re-derives slopes from
      natural_frequencies.csv where possible and flags the missing-SD gap
      for T4/T5. (Path B of the Tier-2 migration.)
    figure_ref: figures/j3-effect-saturation-verified
    panels: 3
    status: built
    migrated: false

