# J3 — canonical figure inventory.
#
# One entry per *manuscript-referenced* figure (not per PNG variant on disk).
# The entries below are placeholders: fill in each with the slug, claim_id,
# panel count, and a one-line description as the manuscript stabilises.
#
# Rules:
#   - `slug` must match <slug>.parquet / <slug>.schema.yml / <slug>.provenance.json.
#   - `claim_id` must exist in figure_inputs/claims/ or be null.
#   - `status` is one of: planned, drafted, built, publication-ready, migrated.
#   - `migrated: true` means the figure came from an existing PNG (F:/GITHUB3) and
#     its Tier-2 parquet was reconstructed post-hoc; mark the output accordingly.
#
# Do not invent data here. When a figure's data is not yet in Tier-2, leave
# `status: planned` and the parquet/schema fields empty.

