# Claim witness — j3-phi-prime
#
# Encodes the F-03 correction from 2026-04-17. T4 and T5's internal
# friction angles were mislabeled in R0; the values below are authoritative.

claim_id: j3-phi-prime
paper: J3
status: corrected
source: critical_review_fixes_20260417
origin_note: |
  In R0, T5 had phi' = 35.5° copied from T3 by mistake, and T4 was labeled
  37.5° instead of 39.3°. Bearing-capacity curves using phi'(T4) or
  phi'(T5) in R0 are therefore biased low.

headline: >
  Corrected internal friction angles: T4 = 39.3°, T5 = 37.3°.

# Reference values — exact, not a range. Anything inside ±tolerance is
# accepted; anything outside fails the claim witness.
reference_values:
  T4:
    value: 39.3
    unit: degree
    tolerance: 0.1
    was: 37.5
  T5:
    value: 37.3
    unit: degree
    tolerance: 0.1
    was: 35.5

assertions:

  # ----- Corrected friction angles (the headline of this claim) -----
  - name: T4_phi_prime_at_39_3_deg
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4"}
      column: phi_prime_deg
    op: near
    value: 39.3
    tolerance: 0.1

  - name: T5_phi_prime_at_37_3_deg
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T5"}
      column: phi_prime_deg
    op: near
    value: 37.3
    tolerance: 0.1

  # ----- Retract the R0-era mislabelled values -----
  - name: T4_phi_prime_not_old_37_5_deg
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4"}
      column: phi_prime_deg
    op: not_near
    value: 37.5
    tolerance: 0.5

  - name: T5_phi_prime_not_old_35_5_deg
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T5"}
      column: phi_prime_deg
    op: not_near
    value: 35.5
    tolerance: 0.5

  # ----- Associated bearing-capacity factors (derived from phi') -----
  - name: T4_nq_at_56
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4"}
      column: n_q
    op: near
    value: 56.0
    tolerance: 0.5

  - name: T5_nq_at_43
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T5"}
      column: n_q
    op: near
    value: 43.0
    tolerance: 0.5

  - name: T4_ngamma_at_92
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4"}
      column: n_gamma
    op: near
    value: 92.0
    tolerance: 1.0

  - name: T5_ngamma_at_64
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T5"}
      column: n_gamma
    op: near
    value: 64.0
    tolerance: 1.0

  # ----- Scour reduces qu to ~58-60% of intact at S/D = 0.58 -----
  - name: qu_norm_at_max_scour_T4
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4", scour_m: 4.7}
      column: qu_norm
    op: between
    lo: 0.55
    hi: 0.65

  - name: qu_norm_at_max_scour_T5
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T5", scour_m: 4.7}
      column: qu_norm
    op: between
    lo: 0.55
    hi: 0.65

  # ----- Density gap: T4 qu is ~1.3-1.4x T5 qu across all scour levels -----
  - name: ratio_t4_t5_at_intact
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4", scour_m: 0.0}
      column: ratio_t4_t5
    op: between
    lo: 1.30
    hi: 1.45

  - name: ratio_t4_t5_at_max_scour
    parquet: bearing-capacity.parquet
    compute:
      op: mean
      filter: {test_id: "T4", scour_m: 4.7}
      column: ratio_t4_t5
    op: between
    lo: 1.30
    hi: 1.45

  # ----- Row inventory: 2 tests x 6 scour stages -----
  - name: row_inventory_two_tests
    parquet: bearing-capacity.parquet
    compute:
      op: row_counts
      group_by: test_id
    op: equal
    value:
      T4: 6
      T5: 6

see_also:
  - ../../../critical_review_fixes_20260417 (memory)
  - ../../planning/methodology_claims.md
